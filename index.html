<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>合成大西瓜</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      touch-action: none;
    }

    #game-wrapper {
      position: relative;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    #hud {
      width: 100%;
      max-width: 400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px 12px 0 0;
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none;
    }

    #score-display {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    #score-label, #next-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #score-value {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }

    #next-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    #next-canvas {
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
    }

    #game-canvas {
      display: block;
      width: 100%;
      max-width: 400px;
      height: auto;
      cursor: crosshair;
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
      touch-action: none;
    }

    #bottom-bar {
      width: 100%;
      max-width: 400px;
      height: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 0 0 12px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-top: none;
    }

    #game-over {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 5, 20, 0.88);
      border-radius: 12px;
      backdrop-filter: blur(4px);
      z-index: 10;
      gap: 12px;
    }

    #game-over.hidden { display: none; }

    #game-over h2 {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.05em;
    }

    #game-over .final-score-row {
      font-size: 18px;
      color: rgba(255,255,255,0.7);
    }

    #final-score {
      font-size: 48px;
      font-weight: 800;
      color: #f9c74f;
      display: block;
      text-align: center;
      line-height: 1.1;
    }

    #restart-btn {
      margin-top: 8px;
      padding: 12px 40px;
      font-size: 18px;
      font-weight: 700;
      color: #1a0a2e;
      background: linear-gradient(135deg, #f9c74f, #f3722c);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 20px rgba(249,199,79,0.4);
    }

    #restart-btn:active { transform: scale(0.96); }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a0a2e;
      border-radius: 12px;
      z-index: 20;
      color: rgba(255,255,255,0.6);
      font-size: 16px;
    }

    #loading.hidden { display: none; }
  </style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div id="score-display">
      <span id="score-label">得分</span>
      <span id="score-value">0</span>
    </div>
    <div id="next-display">
      <span id="next-label">下一个</span>
      <canvas id="next-canvas" width="60" height="60"></canvas>
    </div>
  </div>
  <canvas id="game-canvas" width="400" height="600"></canvas>
  <div id="bottom-bar"></div>

  <div id="game-over" class="hidden">
    <h2>游戏结束 🍉</h2>
    <div class="final-score-row">最终得分</div>
    <span id="final-score">0</span>
    <button id="restart-btn">再来一局</button>
  </div>

  <div id="loading">加载中…</div>
</div>

// ─── 游戏常量 ─────────────────────────────────────────────────────────────
const CANVAS_W    = 400;
const CANVAS_H    = 600;
const WALL_T      = 20;
const FLOOR_Y     = CANVAS_H - WALL_T / 2;
const DROPPER_Y   = 55;
const GAME_OVER_LINE = 110;
const DROP_COOLDOWN  = 750;  // ms

const FRUIT_RADII = [20, 28, 38, 50, 64, 80, 98, 118, 140, 164, 190];
const FRUIT_NAMES = ['🍒','🍓','🍇','🍋','🍊','🍎','🍐','🍑','🍍','🍈','🍉'];

// 默认颜色（无头像时的渐变中心色）
const FRUIT_COLORS = [
  '#FF5370','#FF8A80','#CE93D8','#FFF176','#FFB74D',
  '#EF5350','#66BB6A','#FF8A65','#FFD54F','#A5D6A7','#4CAF50'
];

// 分数：合成后得分（等级越高越多）
const SCORE_VALUES = [1, 3, 6, 10, 15, 21, 28, 36, 45, 55, 66];

// 随机出生等级权重（只有 0-4 级会出现）
const DROP_WEIGHTS = [35, 25, 20, 12, 8]; // 总计 100，对应等级 0-4

// ─── 运行时状态 ───────────────────────────────────────────────────────────
const state = {
  score: 0,
  currentLevel: 0,
  nextLevel: 0,
  dropperX: CANVAS_W / 2,
  fruits: [],
  pendingMerges: new Set(),
  lastDropTime: 0,
  gameOver: false,
  overCandidates: new Map(),   // fruitId → timestamp first above line
  imagesLoaded: new Array(11).fill(null),
  particles: [],
  frameCount: 0,
};

let engine, world, canvas, ctx, nextCanvas, nextCtx;
let fruitIdCounter = 0;
let physicsRunning = false;

// ─── 图片预加载 ────────────────────────────────────────────────────────────
function loadAvatarImages() {
  AVATAR_IMAGES.forEach((url, i) => {
    if (!url) return;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { state.imagesLoaded[i] = img; };
    img.onerror = () => { state.imagesLoaded[i] = null; };
    img.src = url;
  });
}

// ─── 物理引擎初始化 ────────────────────────────────────────────────────────
function initPhysics() {
  const { Engine, World, Bodies, Events } = Matter;

  engine = Engine.create({
    gravity: { x: 0, y: 1.8 },
    positionIterations: 10,
    velocityIterations: 8,
  });
  world = engine.world;

  const wallOpts = { isStatic: true, label: 'wall', restitution: 0.1, friction: 0.5 };
  const leftWall  = Bodies.rectangle(-WALL_T / 2, CANVAS_H / 2, WALL_T, CANVAS_H * 2, wallOpts);
  const rightWall = Bodies.rectangle(CANVAS_W + WALL_T / 2, CANVAS_H / 2, WALL_T, CANVAS_H * 2, wallOpts);
  const floor     = Bodies.rectangle(CANVAS_W / 2, CANVAS_H + WALL_T / 2, CANVAS_W * 2, WALL_T * 2, wallOpts);

  World.add(world, [leftWall, rightWall, floor]);

  Events.on(engine, 'collisionStart', onCollision);
}

// ─── 创建水果物体 ──────────────────────────────────────────────────────────
function createFruitBody(x, y, level) {
  const r = FRUIT_RADII[level];
  const body = Matter.Bodies.circle(x, y, r, {
    restitution: 0.25,
    friction: 0.6,
    frictionAir: 0.008,
    density: 0.002,
    label: 'fruit',
    slop: 0.05,
  });
  body.fruitLevel = level;
  body.fruitId = ++fruitIdCounter;
  body.dropTime = Date.now();

  Matter.World.add(world, body);
  state.fruits.push(body);
  return body;
}

// ─── 投放水果 ──────────────────────────────────────────────────────────────
function dropFruit(x) {
  if (state.gameOver || !physicsRunning) return;
  const now = Date.now();
  if (now - state.lastDropTime < DROP_COOLDOWN) return;

  const r = FRUIT_RADII[state.currentLevel];
  const cx = Math.max(WALL_T + r, Math.min(CANVAS_W - WALL_T - r, x));
  createFruitBody(cx, DROPPER_Y, state.currentLevel);
  state.lastDropTime = now;
  state.currentLevel = state.nextLevel;
  state.nextLevel = randomLevel();
}

// 随机等级（带权重）
function randomLevel() {
  const r = Math.random() * 100;
  let cumulative = 0;
  for (let i = 0; i < DROP_WEIGHTS.length; i++) {
    cumulative += DROP_WEIGHTS[i];
    if (r < cumulative) return i;
  }
  return 0;
}

// ─── 碰撞处理（合并逻辑） ──────────────────────────────────────────────────
function onCollision(event) {
  const pairs = event.pairs;
  for (let i = 0; i < pairs.length; i++) {
    const { bodyA, bodyB } = pairs[i];
    if (bodyA.label !== 'fruit' || bodyB.label !== 'fruit') continue;
    if (bodyA.fruitLevel !== bodyB.fruitLevel) continue;
    if (bodyA.fruitLevel >= 10) {
      // 最大等级：只爆粒子，不合并
      spawnParticles(
        (bodyA.position.x + bodyB.position.x) / 2,
        (bodyA.position.y + bodyB.position.y) / 2,
        bodyA.fruitLevel, 5
      );
      continue;
    }
    if (state.pendingMerges.has(bodyA.fruitId)) continue;
    if (state.pendingMerges.has(bodyB.fruitId)) continue;

    state.pendingMerges.add(bodyA.fruitId);
    state.pendingMerges.add(bodyB.fruitId);

    const mx = (bodyA.position.x + bodyB.position.x) / 2;
    const my = (bodyA.position.y + bodyB.position.y) / 2;
    const newLevel = bodyA.fruitLevel + 1;

    // 延迟到碰撞回调结束后执行，避免破坏 Matter.js 内部结构
    const idA = bodyA.fruitId;
    const idB = bodyB.fruitId;
    setTimeout(() => scheduleMerge(idA, idB, mx, my, newLevel), 0);
  }
}

function scheduleMerge(idA, idB, mx, my, newLevel) {
  // 从 state.fruits 中找到并移除两个 body
  const bodies = [idA, idB].map(id => state.fruits.find(b => b.fruitId === id)).filter(Boolean);
  if (bodies.length < 2) return; // 已被其他合并处理掉

  bodies.forEach(b => {
    Matter.World.remove(world, b);
    state.fruits = state.fruits.filter(f => f.fruitId !== b.fruitId);
    state.pendingMerges.delete(b.fruitId);
    state.overCandidates.delete(b.fruitId);
  });

  // 加分
  state.score += SCORE_VALUES[newLevel];
  document.getElementById('score-value').textContent = state.score;

  // 粒子效果
  spawnParticles(mx, my, newLevel - 1, 10);

  // 创建新水果
  const newBody = createFruitBody(mx, my, newLevel);
  // 给一点向下初速，防止卡住
  Matter.Body.setVelocity(newBody, { x: 0, y: 1 });
}

// ─── 游戏结束检测 ──────────────────────────────────────────────────────────
function checkGameOver() {
  if (state.gameOver) return;
  const now = Date.now();

  for (const body of state.fruits) {
    // 新落下的水果有 1.5s 宽限期
    if (now - body.dropTime < 1500) continue;

    const top = body.position.y - FRUIT_RADII[body.fruitLevel];
    if (top < GAME_OVER_LINE) {
      if (!state.overCandidates.has(body.fruitId)) {
        state.overCandidates.set(body.fruitId, now);
      } else if (now - state.overCandidates.get(body.fruitId) > 1800) {
        triggerGameOver();
        return;
      }
    } else {
      state.overCandidates.delete(body.fruitId);
    }
  }
}

function triggerGameOver() {
  state.gameOver = true;
  physicsRunning = false;
  document.getElementById('final-score').textContent = state.score;
  document.getElementById('game-over').classList.remove('hidden');
}

// ─── 重启游戏 ──────────────────────────────────────────────────────────────
function restart() {
  state.fruits.forEach(b => Matter.World.remove(world, b));
  state.fruits = [];
  state.pendingMerges.clear();
  state.overCandidates.clear();
  state.particles = [];
  state.score = 0;
  state.gameOver = false;
  state.dropperX = CANVAS_W / 2;
  state.lastDropTime = 0;
  state.currentLevel = randomLevel();
  state.nextLevel = randomLevel();
  document.getElementById('score-value').textContent = '0';
  document.getElementById('game-over').classList.add('hidden');
  physicsRunning = true;
}

// ─── 粒子系统 ──────────────────────────────────────────────────────────────
function spawnParticles(x, y, level, count) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 3;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1.0,
      color: FRUIT_COLORS[Math.min(level, FRUIT_COLORS.length - 1)],
      r: 3 + Math.random() * 3,
    });
  }
}

function updateParticles() {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.life -= 0.045;
    if (p.life <= 0) { state.particles.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
  }
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── 绘制函数 ──────────────────────────────────────────────────────────────
function drawBackground() {
  // 渐变背景
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0, '#1e0f3c');
  grad.addColorStop(1, '#0d0620');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

function drawWalls() {
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  // 左墙
  ctx.fillRect(0, 0, WALL_T, CANVAS_H);
  // 右墙
  ctx.fillRect(CANVAS_W - WALL_T, 0, WALL_T, CANVAS_H);
  // 底部
  ctx.fillRect(0, CANVAS_H - WALL_T, CANVAS_W, WALL_T);

  // 墙边高亮线
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(WALL_T, 0); ctx.lineTo(WALL_T, CANVAS_H);
  ctx.moveTo(CANVAS_W - WALL_T, 0); ctx.lineTo(CANVAS_W - WALL_T, CANVAS_H);
  ctx.moveTo(0, CANVAS_H - WALL_T); ctx.lineTo(CANVAS_W, CANVAS_H - WALL_T);
  ctx.stroke();
}

function drawGameOverLine() {
  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = 'rgba(255, 100, 100, 0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(WALL_T, GAME_OVER_LINE);
  ctx.lineTo(CANVAS_W - WALL_T, GAME_OVER_LINE);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(255, 100, 100, 0.35)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('危险线', CANVAS_W - WALL_T - 4, GAME_OVER_LINE - 4);
}

function drawDropperGuide() {
  const level = state.currentLevel;
  const r = FRUIT_RADII[level];
  const x = state.dropperX;

  // 垂直虚线引导
  ctx.setLineDash([4, 7]);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, DROPPER_Y + r + 2);
  ctx.lineTo(x, CANVAS_H - WALL_T);
  ctx.stroke();
  ctx.setLineDash([]);

  // 投放位置的水果预览（半透明）
  ctx.globalAlpha = 0.55;
  drawFruitCircle(ctx, x, DROPPER_Y, level, 0);
  ctx.globalAlpha = 1;
}

function drawAllFruits() {
  for (const body of state.fruits) {
    drawFruitCircle(ctx, body.position.x, body.position.y, body.fruitLevel, body.angle);
  }
}

/**
 * 绘制一个圆形水果（含头像或默认渐变）
 * @param {CanvasRenderingContext2D} c
 * @param {number} x
 * @param {number} y
 * @param {number} level
 * @param {number} angle
 */
function drawFruitCircle(c, x, y, level, angle) {
  const r = FRUIT_RADII[level];
  c.save();
  c.translate(x, y);
  c.rotate(angle);

  // 圆形裁剪
  c.beginPath();
  c.arc(0, 0, r, 0, Math.PI * 2);
  c.clip();

  const img = state.imagesLoaded[level];
  if (img && img.complete && img.naturalWidth > 0) {
    c.drawImage(img, -r, -r, r * 2, r * 2);
  } else {
    drawDefaultFruitFill(c, r, level);
  }

  c.restore();

  // 描边（在裁剪外画，不受裁剪影响）
  c.save();
  c.translate(x, y);
  c.beginPath();
  c.arc(0, 0, r, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(255,255,255,0.35)';
  c.lineWidth = 1.5;
  c.stroke();
  c.restore();
}

function drawDefaultFruitFill(c, r, level) {
  const color = FRUIT_COLORS[level];
  // 径向渐变
  const grad = c.createRadialGradient(-r * 0.25, -r * 0.25, r * 0.05, 0, 0, r);
  grad.addColorStop(0, lightenColor(color, 40));
  grad.addColorStop(0.6, color);
  grad.addColorStop(1, darkenColor(color, 30));
  c.fillStyle = grad;
  c.fillRect(-r, -r, r * 2, r * 2);

  // 等级数字/emoji
  const label = FRUIT_NAMES[level] || String(level + 1);
  const fontSize = Math.max(10, Math.min(r * 0.55, 36));
  c.font = `${fontSize}px sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillStyle = 'rgba(255,255,255,0.95)';
  // emoji 阴影让文字更清晰
  c.shadowColor = 'rgba(0,0,0,0.4)';
  c.shadowBlur = 3;
  c.fillText(label, 0, 1);
  c.shadowBlur = 0;
}

// ─── 下一个水果预览 ────────────────────────────────────────────────────────
function drawNextPreview() {
  nextCtx.clearRect(0, 0, 60, 60);
  const level = state.nextLevel;
  const r = Math.min(FRUIT_RADII[level] * 0.85, 26);

  nextCtx.save();
  nextCtx.translate(30, 30);

  nextCtx.beginPath();
  nextCtx.arc(0, 0, r, 0, Math.PI * 2);
  nextCtx.clip();

  const img = state.imagesLoaded[level];
  if (img && img.complete && img.naturalWidth > 0) {
    nextCtx.drawImage(img, -r, -r, r * 2, r * 2);
  } else {
    drawDefaultFruitFill(nextCtx, r, level);
  }

  nextCtx.restore();

  nextCtx.save();
  nextCtx.translate(30, 30);
  nextCtx.beginPath();
  nextCtx.arc(0, 0, r, 0, Math.PI * 2);
  nextCtx.strokeStyle = 'rgba(255,255,255,0.3)';
  nextCtx.lineWidth = 1.5;
  nextCtx.stroke();
  nextCtx.restore();
}

// ─── 颜色工具 ──────────────────────────────────────────────────────────────
function lightenColor(hex, amount) {
  return adjustColor(hex, amount);
}
function darkenColor(hex, amount) {
  return adjustColor(hex, -amount);
}
function adjustColor(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.max(0, (n >> 16) + amount));
  const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amount));
  const b = Math.min(255, Math.max(0, (n & 0xff) + amount));
  return `rgb(${r},${g},${b})`;
}

// ─── 输入处理 ──────────────────────────────────────────────────────────────
function getCanvasX(clientX) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  return (clientX - rect.left) * scaleX;
}

function initInput() {
  // 鼠标（桌面）
  canvas.addEventListener('mousemove', e => {
    if (state.gameOver) return;
    state.dropperX = getCanvasX(e.clientX);
  });
  canvas.addEventListener('click', e => {
    if (state.gameOver) return;
    state.dropperX = getCanvasX(e.clientX);
    dropFruit(state.dropperX);
  });

  // 触摸（微信/手机）
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state.gameOver) return;
    state.dropperX = getCanvasX(e.touches[0].clientX);
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (state.gameOver) return;
    state.dropperX = getCanvasX(e.touches[0].clientX);
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (state.gameOver) return;
    dropFruit(state.dropperX);
  }, { passive: false });

  // 防止整个页面滑动
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  document.getElementById('restart-btn').addEventListener('click', restart);
}

// ─── 主渲染循环 ────────────────────────────────────────────────────────────
function renderLoop() {
  requestAnimationFrame(renderLoop);

  if (physicsRunning) {
    Matter.Engine.update(engine, 1000 / 60);
    checkGameOver();
    updateParticles();
  }

  drawBackground();
  drawWalls();
  drawGameOverLine();
  if (!state.gameOver) drawDropperGuide();
  drawAllFruits();
  drawParticles();
  drawNextPreview();
}

// ─── 启动 ──────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas    = document.getElementById('game-canvas');
  ctx       = canvas.getContext('2d');
  nextCanvas = document.getElementById('next-canvas');
  nextCtx   = nextCanvas.getContext('2d');

  loadAvatarImages();
  initPhysics();
  initInput();

  state.currentLevel = randomLevel();
  state.nextLevel    = randomLevel();
  state.dropperX     = CANVAS_W / 2;

  physicsRunning = true;

  // 隐藏加载提示
  document.getElementById('loading').classList.add('hidden');

  renderLoop();
});
</script>
